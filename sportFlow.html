<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>SportFlow</title>
        <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">

        <style>
            :root {
                 --bg: #0d0f14;
    --surface: #161921;
    --card: #1e2330;
    --border: #2a3045;
    --accent: #f0ff3a;
    --accent2: #3affd2;
    --accent3: #ff5c5c;
    --text: #eef0f8;
    --muted: #6b7494;
    --radius: 14px;
            }

            * { margin: 0; padding:  0; box-sizing: border-box;}

            body{
                background: var(--bg);
                color: var(--text);
                font-family: 'DM Sans', sans-serif ;
                min-height: 100vh;
                overflow: hidden;
            }

            /* background texture*/

            body::before{
                content: '';
                position: fixed;
                inset: 0;
                background: radial-gradient(ellipse 60% 40% at 80% 10%, rgba(240,255,58,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 10% 90%, rgba(58,255,210,0.05) 0%, transparent 55%);
    pointer-events: none;
    z-index: 0;
            }

            .app{ position: relative; z-index: 1; display: flex; flex-direction: column; min-height: 100vh;}


            /*HEADER*/

            header{
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 20px 32px;
                border-bottom: 1px solid var(--border);
                backdrop-filter: blur(10px);
                position: sticky;
                top: 0;
                z-index: 100;
                background: rgba(13,15,20,0.85);
            }

            .logo span{
                color: var(--text);
            }

            .header-nav{ display: flex; gap: 8px;}
            .nav-btn{
                background: none;
                border: 1px solid var(--border);
                color: var(--muted);
                padding: 8px 18px;
                border-radius: 100px;
                cursor: pointer;
                font-family: 'DM Sans', sans-serif;
                font-style: 14px;
                font-weight: 500;
                transition: all .2s;
            }
            .nav-btn.active, .nav-btn:hover{
                background: var(--accent);
                color: #000;
                border-color: var(--accent);
            }
              /* MAIN */
  main { flex: 1; padding: 32px; max-width: 1200px; margin: 0 auto; width: 100%; }

  /* VIEWS */
  .view { display: none; animation: fadeIn .3s ease; }
  .view.active { display: block; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:none; } }

  /* STATS STRIP */
  .stats-strip {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 32px;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    position: relative;
    overflow: hidden;
  }
  .stat-card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }
  .stat-card:nth-child(1)::after { background: var(--accent); }
  .stat-card:nth-child(2)::after { background: var(--accent2); }
  .stat-card:nth-child(3)::after { background: #ff9d3a; }
  .stat-card:nth-child(4)::after { background: #b03aff; }
  .stat-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .stat-value { font-family: 'Bebas Neue', sans-serif; font-size: 40px; line-height: 1; color: var(--text); }
  .stat-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

  /* WEEK GRID */
  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 16px;
    text-transform: uppercase;
  }

  .week-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 10px;
    margin-bottom: 32px;
  }

  .day-col {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 10px;
    min-height: 140px;
    cursor: pointer;
    transition: border-color .2s, transform .15s;
    position: relative;
  }
  .day-col:hover { border-color: var(--accent); transform: translateY(-2px); }
  .day-col.today { border-color: var(--accent); }
  .day-col.today .day-label { color: var(--accent); }

  .day-label {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 13px;
    letter-spacing: 1.5px;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .day-num {
    font-size: 24px;
    font-weight: 700;
    margin-bottom: 10px;
    line-height: 1;
  }

  .session-pill {
    background: rgba(240,255,58,0.12);
    border: 1px solid rgba(240,255,58,0.3);
    color: var(--accent);
    border-radius: 8px;
    padding: 4px 8px;
    font-size: 11px;
    font-weight: 500;
    margin-bottom: 4px;
    cursor: pointer;
    transition: background .15s;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .session-pill:hover { background: rgba(240,255,58,0.25); }
  .session-pill.rest { background: rgba(107,116,148,0.1); border-color: rgba(107,116,148,0.2); color: var(--muted); }
  .session-pill.done { background: rgba(58,255,210,0.1); border-color: rgba(58,255,210,0.3); color: var(--accent2); }

  /* ADD SESSION MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(6px);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 32px;
    width: 440px;
    max-width: 95vw;
    animation: slideUp .3s ease;
  }
  @keyframes slideUp { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:none; } }
  .modal-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 2px;
    margin-bottom: 24px;
  }

  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; display: block; }
  .form-input, .form-select {
    width: 100%;
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 16px;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    outline: none;
    transition: border-color .2s;
  }
  .form-input:focus, .form-select:focus { border-color: var(--accent); }
  .form-select option { background: var(--card); }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .sport-chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .sport-chip {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    padding: 6px 14px;
    border-radius: 100px;
    cursor: pointer;
    font-size: 13px;
    transition: all .15s;
    user-select: none;
  }
  .sport-chip.selected, .sport-chip:hover {
    background: rgba(240,255,58,0.12);
    border-color: var(--accent);
    color: var(--accent);
  }

  .btn-row { display: flex; gap: 12px; margin-top: 24px; }
  .btn {
    flex: 1;
    padding: 13px;
    border-radius: 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    transition: all .15s;
  }
  .btn-primary { background: var(--accent); color: #000; }
  .btn-primary:hover { background: #e8f530; transform: translateY(-1px); }
  .btn-ghost { background: var(--card); color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:hover { border-color: var(--text); }
  .btn-danger { background: rgba(255,92,92,0.15); color: var(--accent3); border: 1px solid var(--accent3); }

  /* PROGRAMME VIEW */
  .program-list { display: flex; flex-direction: column; gap: 12px; }
  .program-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    display: flex;
    align-items: center;
    gap: 20px;
    transition: border-color .2s;
  }
  .program-card:hover { border-color: var(--accent); }
  .sport-icon {
    width: 48px; height: 48px;
    border-radius: 12px;
    background: rgba(240,255,58,0.1);
    border: 1px solid rgba(240,255,58,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .program-info { flex: 1; }
  .program-name { font-weight: 700; font-size: 16px; margin-bottom: 4px; }
  .program-meta { font-size: 13px; color: var(--muted); }
  .program-actions { display: flex; gap: 8px; }
  .icon-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    width: 36px; height: 36px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s;
  }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent); }
  .icon-btn.danger:hover { border-color: var(--accent3); color: var(--accent3); }

  /* PROGRESS CIRCLES */
  .progress-ring { position: relative; display: inline-flex; align-items: center; justify-content: center; }
  .ring-label { position: absolute; font-family: 'Bebas Neue', sans-serif; font-size: 18px; }

  /* HISTORIQUE */
  .history-table {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    width: 100%;
    border-collapse: collapse;
  }
  .history-table th {
    background: var(--surface);
    padding: 14px 20px;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--muted);
    text-align: left;
    font-weight: 600;
  }
  .history-table td {
    padding: 14px 20px;
    border-top: 1px solid var(--border);
    font-size: 14px;
  }
  .badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 700;
  }
  .badge-done { background: rgba(58,255,210,0.12); color: var(--accent2); border: 1px solid rgba(58,255,210,0.3); }
  .badge-miss { background: rgba(255,92,92,0.12); color: var(--accent3); border: 1px solid rgba(255,92,92,0.3); }

  /* ADD BUTTON FLOATING */
  .fab {
    position: fixed;
    bottom: 32px;
    right: 32px;
    background: var(--accent);
    color: #000;
    width: 56px; height: 56px;
    border-radius: 100%;
    border: none;
    font-size: 28px;
    cursor: pointer;
    box-shadow: 0 8px 30px rgba(240,255,58,0.4);
    display: flex; align-items: center; justify-content: center;
    font-weight: 300;
    transition: transform .2s, box-shadow .2s;
    z-index: 200;
  }
  .fab:hover { transform: scale(1.1); box-shadow: 0 12px 40px rgba(240,255,58,0.6); }

  /* EMPTY STATE */
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty h3 { font-size: 18px; color: var(--text); margin-bottom: 8px; }

  @media (max-width: 768px) {
    main { padding: 16px; }
    header { padding: 14px 16px; }
    .stats-strip { grid-template-columns: 1fr 1fr; }
    .week-grid { grid-template-columns: repeat(4, 1fr); }
    .stat-value { font-size: 30px; }
  }
  @media (max-width: 480px) {
    .week-grid { grid-template-columns: repeat(2, 1fr); }
  }



        </style>
    </head>

    <body>
        <div class="app">

  <header>
    <div class="logo">Sport<span>Flow</span></div>
    <nav class="header-nav">
      <button class="nav-btn active" onclick="showView('planning')">Planning</button>
      <button class="nav-btn" onclick="showView('programme')">Programme</button>
      <button class="nav-btn" onclick="showView('historique')">Historique</button>
    </nav>
  </header>
<main>

    <!-- PLANNING VIEW -->
    <div class="view active" id="view-planning">
      <div class="stats-strip" id="stats-strip"></div>
      <div class="section-title">Semaine en cours</div>
      <div class="week-grid" id="week-grid"></div>
    </div>

    <!-- PROGRAMME VIEW -->
    <div class="view" id="view-programme">
      <div class="section-title">Mes Sports</div>
      <div class="program-list" id="program-list"></div>
    </div>

    <!-- HISTORIQUE VIEW -->
    <div class="view" id="view-historique">
      <div class="section-title">Historique des séances</div>
      <div id="history-container"></div>
    </div>

  </main>

  <button class="fab" onclick="openModal(null)" title="Ajouter une séance">+</button>
</div>

<!-- MODAL AJOUTER/ÉDITER SÉANCE -->
<div class="modal-overlay" id="session-modal">
  <div class="modal">
    <div class="modal-title" id="modal-title">Nouvelle séance</div>

    <div class="form-group">
      <label class="form-label">Sport</label>
      <div class="sport-chips" id="sport-chips"></div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Date</label>
        <input type="date" class="form-input" id="field-date">
      </div>
      <div class="form-group">
        <label class="form-label">Heure</label>
        <input type="time" class="form-input" id="field-time">
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Durée (min)</label>
        <input type="number" class="form-input" id="field-duration" placeholder="60" min="5" max="300">
      </div>
      <div class="form-group">
        <label class="form-label">Intensité</label>
        <select class="form-select" id="field-intensity">
          <option value="faible">🟢 Faible</option>
          <option value="modérée" selected>🟡 Modérée</option>
          <option value="élevée">🟠 Élevée</option>
          <option value="max">🔴 Maximale</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label class="form-label">Notes (optionnel)</label>
      <input type="text" class="form-input" id="field-notes" placeholder="Ex: cardio 30min + musculation...">
    </div>

    <div class="btn-row">
      <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
      <button class="btn btn-primary" onclick="saveSession()">Enregistrer</button>
    </div>
    <div class="btn-row" id="delete-row" style="display:none; margin-top:0;">
      <button class="btn btn-danger" onclick="deleteSession()">🗑 Supprimer la séance</button>
    </div>
  </div>
</div>

<script>
// ─── DATA ───────────────────────────────────────────────────────────────────

const SPORTS = [
  { id:'run', label:'Course', icon:'🏃' },
  { id:'gym', label:'Salle', icon:'🏋️' },
  { id:'bike', label:'Vélo', icon:'🚴' },
  { id:'swim', label:'Natation', icon:'🏊' },
  { id:'yoga', label:'Yoga', icon:'🧘' },
  { id:'football', label:'Football', icon:'⚽' },
  { id:'basket', label:'Basket', icon:'🏀' },
  { id:'tennis', label:'Tennis', icon:'🎾' },
  { id:'box', label:'Boxe', icon:'🥊' },
  { id:'hike', label:'Randonnée', icon:'🥾' },
];

const DEFAULT_SESSIONS = [];

function loadSessions() {
  try { return JSON.parse(localStorage.getItem('sportflow_sessions') || '[]'); } catch { return []; }
}
function saveSessions(s) { localStorage.setItem('sportflow_sessions', JSON.stringify(s)); }
let sessions = loadSessions();

// ─── HELPERS ────────────────────────────────────────────────────────────────
function today() { return new Date().toISOString().slice(0,10); }
function getWeekDates() {
  const now = new Date();
  const day = now.getDay(); // 0=dim
  const monday = new Date(now);
  monday.setDate(now.getDate() - ((day + 6) % 7));
  return Array.from({length:7}, (_, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return d.toISOString().slice(0,10);
  });
}
function formatDate(str) {
  const [y,m,d] = str.split('-');
  return `${d}/${m}/${y}`;
}
function sportById(id) { return SPORTS.find(s => s.id === id) || {label: id, icon:'🏅'}; }

// ─── STATS ──────────────────────────────────────────────────────────────────
function renderStats() {
  const week = getWeekDates();
  const weekSessions = sessions.filter(s => week.includes(s.date));
  const doneSessions = sessions.filter(s => s.done);
  const totalMin = doneSessions.reduce((a,s) => a + (s.duration||0), 0);
  const streak = computeStreak();

  document.getElementById('stats-strip').innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Séances cette semaine</div>
      <div class="stat-value">${weekSessions.length}</div>
      <div class="stat-sub">planifiées</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Minutes totales</div>
      <div class="stat-value">${totalMin}</div>
      <div class="stat-sub">depuis le début</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Séances réalisées</div>
      <div class="stat-value">${doneSessions.length}</div>
      <div class="stat-sub">au total</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Streak</div>
      <div class="stat-value">${streak}</div>
      <div class="stat-sub">jours consécutifs 🔥</div>
    </div>
  `;
}

function computeStreak() {
  const doneByDate = {};
  sessions.filter(s => s.done).forEach(s => { doneByDate[s.date] = true; });
  let streak = 0;
  const d = new Date();
  while (true) {
    const key = d.toISOString().slice(0,10);
    if (doneByDate[key]) { streak++; d.setDate(d.getDate()-1); }
    else break;
  }
  return streak;
}

// ─── WEEK GRID ──────────────────────────────────────────────────────────────
const DAYS = ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'];

function renderWeek() {
  const week = getWeekDates();
  const todayStr = today();
  const grid = document.getElementById('week-grid');
  grid.innerHTML = '';

  week.forEach((date, i) => {
    const daySessions = sessions.filter(s => s.date === date);
    const dayNum = date.slice(8);
    const isToday = date === todayStr;

    const pills = daySessions.map(s => {
      const sp = sportById(s.sport);
      const cls = s.done ? 'done' : '';
      return `<div class="session-pill ${cls}" onclick="editSession('${s.id}', event)" title="${sp.label} ${s.duration||'?'}min">
        ${sp.icon} ${sp.label}${s.done ? ' ✓' : ''}
      </div>`;
    }).join('');

    grid.innerHTML += `
      <div class="day-col ${isToday ? 'today' : ''}" onclick="openModal('${date}')">
        <div class="day-label">${DAYS[i]}</div>
        <div class="day-num">${dayNum}</div>
        ${pills || '<div style="font-size:11px;color:var(--muted);margin-top:4px;">Repos</div>'}
      </div>`;
  });
}

// ─── PROGRAMME VIEW ─────────────────────────────────────────────────────────
function renderProgramme() {
  const counts = {};
  sessions.forEach(s => { counts[s.sport] = (counts[s.sport]||0)+1; });

  const allSports = [...new Set(sessions.map(s => s.sport))];
  const list = document.getElementById('program-list');

  if (!allSports.length) {
    list.innerHTML = `<div class="empty"><div class="empty-icon">💪</div><h3>Pas encore de séances</h3><p>Ajoute ta première séance via le bouton +</p></div>`;
    return;
  }

  list.innerHTML = allSports.map(id => {
    const sp = sportById(id);
    const total = counts[id] || 0;
    const done = sessions.filter(s => s.sport === id && s.done).length;
    const totalMin = sessions.filter(s => s.sport === id && s.done).reduce((a,s)=>a+(s.duration||0),0);
    return `
      <div class="program-card">
        <div class="sport-icon">${sp.icon}</div>
        <div class="program-info">
          <div class="program-name">${sp.label}</div>
          <div class="program-meta">${total} séance(s) planifiée(s) · ${done} réalisée(s) · ${totalMin} min au total</div>
        </div>
      </div>`;
  }).join('');
}

// ─── HISTORIQUE VIEW ────────────────────────────────────────────────────────
function renderHistorique() {
  const sorted = [...sessions].sort((a,b) => b.date.localeCompare(a.date));
  const container = document.getElementById('history-container');

  if (!sorted.length) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">📅</div><h3>Aucun historique</h3><p>Tes séances apparaîtront ici</p></div>`;
    return;
  }

  const rows = sorted.map(s => {
    const sp = sportById(s.sport);
    const badge = s.done
      ? '<span class="badge badge-done">✓ Réalisée</span>'
      : '<span class="badge badge-miss">En attente</span>';
    return `<tr>
      <td>${formatDate(s.date)}</td>
      <td>${sp.icon} ${sp.label}</td>
      <td>${s.time || '—'}</td>
      <td>${s.duration ? s.duration + ' min' : '—'}</td>
      <td>${s.intensity || '—'}</td>
      <td>${badge}</td>
      <td>
        <div style="display:flex;gap:6px;">
          <button class="icon-btn" onclick="toggleDone('${s.id}')" title="${s.done ? 'Marquer non fait' : 'Marquer fait'}">${s.done ? '↩' : '✓'}</button>
          <button class="icon-btn danger" onclick="deleteById('${s.id}')" title="Supprimer">🗑</button>
        </div>
      </td>
    </tr>`;
  }).join('');

  container.innerHTML = `
    <table class="history-table" style="width:100%">
      <thead>
        <tr>
          <th>Date</th><th>Sport</th><th>Heure</th><th>Durée</th><th>Intensité</th><th>Statut</th><th>Actions</th>
        </tr>
      </thead>
      <tbody>${rows}</tbody>
    </table>`;
}

// ─── MODAL ──────────────────────────────────────────────────────────────────
let editingId = null;
let selectedSport = SPORTS[0].id;

function buildChips() {
  document.getElementById('sport-chips').innerHTML = SPORTS.map(s =>
    `<div class="sport-chip ${s.id === selectedSport ? 'selected' : ''}" onclick="selectSport('${s.id}', this)">${s.icon} ${s.label}</div>`
  ).join('');
}

function selectSport(id, el) {
  selectedSport = id;
  document.querySelectorAll('.sport-chip').forEach(c => c.classList.remove('selected'));
  el.classList.add('selected');
}

function openModal(date) {
  editingId = null;
  selectedSport = SPORTS[0].id;
  document.getElementById('modal-title').textContent = 'Nouvelle séance';
  document.getElementById('field-date').value = date || today();
  document.getElementById('field-time').value = '07:00';
  document.getElementById('field-duration').value = '60';
  document.getElementById('field-intensity').value = 'modérée';
  document.getElementById('field-notes').value = '';
  document.getElementById('delete-row').style.display = 'none';
  buildChips();
  document.getElementById('session-modal').classList.add('open');
}

function editSession(id, ev) {
  ev.stopPropagation();
  const s = sessions.find(x => x.id === id);
  if (!s) return;
  editingId = id;
  selectedSport = s.sport;
  document.getElementById('modal-title').textContent = 'Modifier la séance';
  document.getElementById('field-date').value = s.date;
  document.getElementById('field-time').value = s.time || '';
  document.getElementById('field-duration').value = s.duration || '';
  document.getElementById('field-intensity').value = s.intensity || 'modérée';
  document.getElementById('field-notes').value = s.notes || '';
  document.getElementById('delete-row').style.display = 'flex';
  buildChips();
  document.getElementById('session-modal').classList.add('open');
}

function closeModal() {
  document.getElementById('session-modal').classList.remove('open');
}

function saveSession() {
  const date = document.getElementById('field-date').value;
  if (!date) { alert('Veuillez choisir une date.'); return; }
  const session = {
    id: editingId || Date.now().toString(),
    sport: selectedSport,
    date,
    time: document.getElementById('field-time').value,
    duration: parseInt(document.getElementById('field-duration').value) || 0,
    intensity: document.getElementById('field-intensity').value,
    notes: document.getElementById('field-notes').value,
    done: false,
  };
  if (editingId) {
    const idx = sessions.findIndex(s => s.id === editingId);
    session.done = sessions[idx].done;
    sessions[idx] = session;
  } else {
    sessions.push(session);
  }
  saveSessions(sessions);
  closeModal();
  renderAll();
}

function deleteSession() {
  if (!editingId) return;
  deleteById(editingId);
  closeModal();
}

function deleteById(id) {
  if (!confirm('Supprimer cette séance ?')) return;
  sessions = sessions.filter(s => s.id !== id);
  saveSessions(sessions);
  renderAll();
}

function toggleDone(id) {
  const s = sessions.find(x => x.id === id);
  if (s) { s.done = !s.done; saveSessions(sessions); renderAll(); }
}

// ─── VIEWS ──────────────────────────────────────────────────────────────────
let currentView = 'planning';
function showView(name) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('view-' + name).classList.add('active');
  document.querySelectorAll('.nav-btn')[['planning','programme','historique'].indexOf(name)].classList.add('active');
  currentView = name;
  renderAll();
}

function renderAll() {
  renderStats();
  renderWeek();
  renderProgramme();
  renderHistorique();
}

// Close modal on overlay click
document.getElementById('session-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// Init
renderAll();
</script>
